name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Force Node.js 24 for Actions
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run lint
        run: npm run lint
      
      - name: Run tests
        run: npm run test:run
      
      - name: Build project
        run: npm run build
      
      - name: Create build archive
        run: |
          cd dist
          zip -r ../dist.zip .
          cd ..
      
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        uses: mathiasvr/command-output@v2.0.0
        with:
          run: |
            VERSION="${{ steps.version.outputs.VERSION }}"
            
            # 使用 GitHub API 获取上一次发布的 Release 标签
            PREV_TAG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100" | \
              grep -o '"tag_name": *"[^"]*"' | \
              grep -o 'v[0-9]*\.[0-9]*\.[0-9]*\.[0-9]*' | \
              grep -v "^v$VERSION$" | \
              head -n 1 || echo "")

            if [ -z "$PREV_TAG" ]; then
              # 如果没有上一个 Release，提取当前版本的更新日志
              CHANGELOG=$(awk -v version="v$VERSION" '
                /^## \[v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\]/ {
                  if (found) exit
                  if ($0 ~ "\\[" version "\\]") {
                    found=1
                    next
                  }
                }
                found && /^---$/ { next }
                found && /^## \[v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\]/ { exit }
                found { print }
              ' CHANGELOG.md)
            else
              # 提取从上一个发布标签到当前标签之间的所有版本更新日志
              PREV_VERSION="${PREV_TAG#v}"
              CHANGELOG=$(awk -v current="v$VERSION" -v prev="v$PREV_VERSION" '
                BEGIN { in_range=0 }
                /^## \[v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\]/ {
                  # 找到当前版本，开始记录
                  if ($0 ~ "\\[" current "\\]") {
                    in_range=1
                    next
                  }
                  # 找到上一个发布版本，停止记录
                  if (in_range && $0 ~ "\\[" prev "\\]") {
                    exit
                  }
                  # 在范围内遇到其他版本标题，保留标题但跳过 ## 标记
                  if (in_range) {
                    print ""
                    print $0
                    next
                  }
                }
                # 跳过分隔线
                in_range && /^---$/ { next }
                # 记录内容
                in_range { print }
              ' CHANGELOG.md)
            fi
            
            if [ -z "$CHANGELOG" ]; then
              echo "自动构建发布"
            else
              echo "$CHANGELOG"
            fi
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.version.outputs.VERSION }}
          body: |
            ## 版本 v${{ steps.version.outputs.VERSION }}
            
            ${{ steps.changelog.outputs.stdout }}
          files: dist.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-v${{ steps.version.outputs.VERSION }}
          path: dist/
          retention-days: 30