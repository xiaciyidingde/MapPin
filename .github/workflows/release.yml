name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+.[0-9]+'

jobs:
  # Job 1: 构建 Web 版本
  build-web:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run lint
        run: npm run lint
      
      - name: Run tests
        run: npm run test:run
      
      - name: Build Web
        run: npm run build:web
      
      - name: Create Web archive
        run: |
          cd dist
          zip -r ../dist-web.zip .
          cd ..
      
      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1
      
      - name: Upload Web archive
        uses: actions/upload-artifact@v4
        with:
          name: web-archive
          path: dist-web.zip
          retention-days: 1
  
  # Job 2: 构建 Android Release 版本
  build-android-release:
    runs-on: ubuntu-latest
    needs: build-web
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: npm ci
      
      - name: Download Web artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      
      - name: Remove compressed files for Android
        run: |
          find dist -name "*.gz" -delete
          find dist -name "*.br" -delete
      
      - name: Generate or decode keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_FILE }}" ]; then
            echo "KEYSTORE_FILE secret is empty, generating new keystore..."
            keytool -genkeypair -v \
              -storetype PKCS12 \
              -keystore android/mappin-release-key.jks \
              -alias mappin \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -sigalg SHA256withRSA \
              -dname "CN=xiaci, OU=mappin, O=mappin, L=beijing, ST=beijing, C=CN" \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}"
            
            # 使用 GPG 加密 keystore
            echo "${{ secrets.KEYSTORE_ENCRYPTION_KEY }}" | gpg --batch --yes --passphrase-fd 0 --symmetric --cipher-algo AES256 -o android/mappin-release-key.jks.gpg android/mappin-release-key.jks
            
            echo "::notice::Generated and encrypted new keystore"
            echo "::notice::Please download 'generated-keystore' artifact and add mappin-release-key.jks.gpg to GitHub Secret KEYSTORE_FILE (base64 encoded)"
            echo "::notice::Run: base64 -w 0 android/mappin-release-key.jks.gpg"
          else
            echo "Decoding and decrypting keystore from secret..."
            echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > android/mappin-release-key.jks.gpg
            echo "${{ secrets.KEYSTORE_ENCRYPTION_KEY }}" | gpg --batch --yes --passphrase-fd 0 --decrypt -o android/mappin-release-key.jks android/mappin-release-key.jks.gpg
          fi
      
      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=mappin-release-key.jks
          EOF
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
      
      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease
      
      - name: Check if keystore was generated
        id: keystore_check
        run: |
          if [ -f "android/mappin-release-key.jks.gpg" ] && [ ! -s "android/mappin-release-key.jks.gpg.downloaded" ]; then
            echo "generated=true" >> $GITHUB_OUTPUT
          else
            echo "generated=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload generated keystore (if new)
        if: steps.keystore_check.outputs.generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: generated-keystore
          path: |
            android/mappin-release-key.jks
            android/mappin-release-key.jks.gpg
          retention-days: 7
      
      - name: Verify APK signature
        run: |
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | head -1)
          $APKSIGNER verify --verbose android/app/build/outputs/apk/release/app-release.apk
      
      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/MapPin-v${VERSION}-release.apk
      
      - name: Upload Android Release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/MapPin-*.apk
          retention-days: 1
  
  # Job 3: 创建 GitHub Release
  create-release:
    runs-on: ubuntu-latest
    needs: [build-web, build-android-release]
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: Extract changelog
        id: changelog
        uses: mathiasvr/command-output@v2.0.0
        with:
          run: |
            VERSION="${{ steps.version.outputs.VERSION }}"
            
            # 使用 GitHub API 获取上一次发布的 Release 标签
            PREV_TAG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100" | \
              grep -o '"tag_name": *"[^"]*"' | \
              grep -o 'v[0-9]*\.[0-9]*\.[0-9]*\.[0-9]*' | \
              grep -v "^v$VERSION$" | \
              head -n 1 || echo "")

            if [ -z "$PREV_TAG" ]; then
              # 如果没有上一个 Release，提取当前版本的更新日志
              CHANGELOG=$(awk -v version="v$VERSION" '
                /^## \[v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\]/ {
                  if (found) exit
                  if ($0 ~ "\\[" version "\\]") {
                    found=1
                    next
                  }
                }
                found && /^---$/ { next }
                found && /^## \[v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\]/ { exit }
                found { print }
              ' CHANGELOG.md)
            else
              # 提取从上一个发布标签到当前标签之间的所有版本更新日志
              PREV_VERSION="${PREV_TAG#v}"
              CHANGELOG=$(awk -v current="v$VERSION" -v prev="v$PREV_VERSION" '
                BEGIN { in_range=0 }
                /^## \[v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\]/ {
                  # 找到当前版本，开始记录
                  if ($0 ~ "\\[" current "\\]") {
                    in_range=1
                    next
                  }
                  # 找到上一个发布版本，停止记录
                  if (in_range && $0 ~ "\\[" prev "\\]") {
                    exit
                  }
                  # 在范围内遇到其他版本标题，保留标题但跳过 ## 标记
                  if (in_range) {
                    print ""
                    print $0
                    next
                  }
                }
                # 跳过分隔线
                in_range && /^---$/ { next }
                # 记录内容
                in_range { print }
              ' CHANGELOG.md)
            fi
            
            if [ -z "$CHANGELOG" ]; then
              echo "自动构建发布"
            else
              echo "$CHANGELOG"
            fi
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.version.outputs.VERSION }}
          body: |
            ## 版本 v${{ steps.version.outputs.VERSION }}
            
            ${{ steps.changelog.outputs.stdout }}
            
            ---
            
            ## 📦 下载
            
            Web 版本: [📥 下载 Web 部署包 (dist-web.zip)](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/dist-web.zip)
            
            Android 版本: [📥 下载 Android APK (MapPin-v${{ steps.version.outputs.VERSION }}-release.apk)](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/MapPin-v${{ steps.version.outputs.VERSION }}-release.apk)
          files: |
            artifacts/web-archive/dist-web.zip
            artifacts/android-release-apk/MapPin-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}